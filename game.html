<!DOCTYPE html>
<html>
<head>
    <title>Flappy Bird JS</title>
    <style>
        canvas { background: #70c5ce; display: block; margin: 0 auto; border: 2px solid #000; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game Variables
        let birdY = 150, birdV = 0, gravity = 0.25;
        let pipes = [];
        let score = 0;
        let frame = 0;

        function jump() { birdV = -5; }

        // Input: Keyboard (Space)
        window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });

        // Input: Joystick Support
        function checkJoystick() {
            const gamepads = navigator.getGamepads();
            if (gamepads[0]) {
                // Jump if any button is pressed
                if (gamepads[0].buttons.some(b => b.pressed)) jump();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            checkJoystick();

            // Bird Physics
            birdV += gravity;
            birdY += birdV;

            // Draw Bird
            ctx.fillStyle = "yellow";
            ctx.fillRect(50, birdY, 20, 20);

            // Handle Pipes
            if (frame % 100 === 0) {
                let gapTop = Math.random() * (canvas.height - 150) + 50;
                pipes.push({ x: canvas.width, top: gapTop });
            }

            pipes.forEach((p, i) => {
                p.x -= 2;
                ctx.fillStyle = "green";
                // Top Pipe
                ctx.fillRect(p.x, 0, 50, p.x < -50 ? 0 : p.top);
                // Bottom Pipe (100px gap)
                ctx.fillRect(p.x, p.top + 100, 50, canvas.height);

                // Collision & Scoring
                if (p.x === 50) score++;
                if (birdY < 0 || birdY > canvas.height || (p.x < 70 && p.x > 30 && (birdY < p.top || birdY + 20 > p.top + 100))) {
                    location.reload(); // Game Over - Restart
                }
            });

            pipes = pipes.filter(p => p.x > -50);

            // Draw Score
            ctx.fillStyle = "black";
            ctx.font = "20px Arial";
            ctx.fillText(`Score: ${score}`, 10, 25);

            frame++;
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
